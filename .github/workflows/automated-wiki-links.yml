name: Automated Wiki Updates

on:
  workflow_dispatch:
    inputs:
      recheck_all_links:
        description: 'Recheck All Wiki Links'
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC

jobs:
  update-data:
    runs-on: ubuntu-latest

    if: ${{ github.repository_id == '247692460' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install requests library
        run: python -m pip install requests

      - name: Run Python automated wiki links script
        run: python .github/scripts/updateWikiLinks.py
        env:
          SHOULD_RECHECK_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.recheck_all_links }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update data for Hypixel and Independent Wiki links"
          git push --force origin HEAD:bot/automated-wiki-updates

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/automated-wiki-updates
          base: master
          title: "Automated Updates"
          body: "This pull request contains the latest data from the Hypixel Wiki and Independent Wiki"
          labels: "automated update"
