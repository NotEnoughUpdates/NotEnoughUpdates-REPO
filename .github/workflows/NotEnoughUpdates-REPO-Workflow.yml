name: NotEnoughUpdates REPO Workflow

# Controls when the action will run. 
on:
  pull_request_target:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ '247692460' == github.repository_id || 'workflow_dispatch' == github.event_name }}
    steps:
    - name: Find HEAD
      id: sha
      run: |
        if [ $EVENT == 'pull_request_target' ]
        then
            echo "sha=$PR" >> $GITHUB_OUTPUT
        else
            echo "sha=$HEAD" >> $GITHUB_OUTPUT
        fi
      env:
        EVENT: ${{ github.event_name }}
        PR: ${{ github.event.pull_request.head.sha }}
        HEAD: ${{ github.sha }}
    - uses: actions/checkout@v6
      with: 
        ref: ${{ steps.sha.outputs.sha }}
    - name: run-checks
      uses: NotEnoughUpdates/NotEnoughUpdates-REPO-Workflow@main
      with: 
        repo-token: ${{secrets.GITHUB_TOKEN}}
